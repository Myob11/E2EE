version: '3.8'

services:
  # =====================
  # NGINX Reverse Proxy
  # =====================
  nginx:
    image: nginx:alpine
    container_name: e2ee_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./services/api_gateway/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api_gateway
    networks:
      - e2ee_network
    restart: unless-stopped

  # =====================
  # API Gateway (FastAPI)
  # =====================
  api_gateway:
    build:
      context: ./services/api_gateway
      dockerfile: Dockerfile
    container_name: e2ee_api_gateway
    ports:
      - "8000:8000"
    environment:
      - AUTH_SERVICE_URL=http://e2ee_auth_service:8001
      - CHAT_SERVICE_URL=http://e2ee_chat_service:8002
      - MESSAGE_SERVICE_URL=http://e2ee_message_service:8003
      - MEDIA_SERVICE_URL=http://e2ee_media_service:8004
      - DOMAIN=secra.top
    depends_on:
      - auth_service
      - chat_service
      - message_service
      - media_service
    networks:
      - e2ee_network
    restart: unless-stopped

  # =====================
  # Auth Service
  # =====================
  auth_service:
    build:
      context: ./services/auth_service
      dockerfile: Dockerfile
    container_name: e2ee_auth_service
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/auth_db
      - SECRET_KEY=your-secret-key-change-in-production
    depends_on:
      - postgres
    networks:
      - e2ee_network
    restart: unless-stopped

  # =====================
  # Chat Service
  # =====================
  chat_service:
    build:
      context: ./services/chat_service
      dockerfile: Dockerfile
    container_name: e2ee_chat_service
    ports:
      - "8002:8002"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    networks:
      - e2ee_network
    restart: unless-stopped

  # =====================
  # Message Service
  # =====================
  message_service:
    build:
      context: ./services/message_service
      dockerfile: Dockerfile
    container_name: e2ee_message_service
    ports:
      - "8003:8003"
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DB=messages_db
    depends_on:
      - mongodb
    networks:
      - e2ee_network
    restart: unless-stopped

  # =====================
  # Media Service
  # =====================
  media_service:
    build:
      context: ./services/media_service
      dockerfile: Dockerfile
    container_name: e2ee_media_service
    ports:
      - "8004:8004"
    environment:
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=media
      - MINIO_SECURE=false
      - DOMAIN=secra.top
    depends_on:
      - minio
    networks:
      - e2ee_network
    restart: unless-stopped

  # =====================
  # Databases
  # =====================
  postgres:
    image: postgres:15-alpine
    container_name: e2ee_postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=auth_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - e2ee_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: e2ee_redis
    ports:
      - "6379:6379"
    networks:
      - e2ee_network
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: e2ee_mongodb
    environment:
      - MONGO_INITDB_DATABASE=messages_db
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - e2ee_network
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: e2ee_minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - e2ee_network
    restart: unless-stopped

networks:
  e2ee_network:
    driver: bridge

volumes:
  postgres_data:
  mongodb_data:
  minio_data: